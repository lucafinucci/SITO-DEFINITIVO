name: Deploy Finch-AI to Aruba

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-aruba
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------- BUILD REACT/VITE --------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build RAG index (chatbot)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_BUILD }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY_BUILD secret non impostato — chunks.json non verrà generato."
            mkdir -p public/rag
          else
            npm run rag:build
          fi

      - name: Build project
        run: npm run build

      # -------- DEPLOY SITO PUBBLICO (dist) --------
      - name: Deploy sito pubblico (dist) via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_SERVER }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}

          local-dir: ./dist/
          server-dir: /www.finch-ai.it/

          # NON toccare area-clienti e cartelle operative
          exclude: |
            area-clienti/**
            logs/**
            **/.env
            **/.env.*

      # -------- DEPLOY AREA CLIENTI (PHP) --------
      - name: Deploy area-clienti (PHP) via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_SERVER }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}

          local-dir: ./area-clienti/
          server-dir: /www.finch-ai.it/area-clienti/

          exclude: |
            **/.env
            **/.env.*
            **/logs/**